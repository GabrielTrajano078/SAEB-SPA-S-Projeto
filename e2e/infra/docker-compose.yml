services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${E2E_MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_DATABASE: spas_saeb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
